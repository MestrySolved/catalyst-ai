apiVersion: v1
kind: Namespace
metadata:
  name: {{ namespace_name }}
  labels:
    managed-by: catalyst-ai
    env: {{ env_type }}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: {{ namespace_name }}
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
